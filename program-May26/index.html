  if (week === 4) return Math.max(1, Math.floor(baseSets * 0.6));
  return baseSets;

// ─── HELPERS ───────────────────────────────────────────────────────────
function getSetsReps(block, week) {
  if (block.isA1) {
    return {
      sets: A1_SETS_BY_WEEK[week],
      reps: A1_REPS_BY_WEEK[week],
      rir: A1_RIR_BY_WEEK[week],
    };
  }
  const sets = setsForWeek(block.baseSets || 3, week);
  const rir = week === 4 ? "4 (deload)" : block.baseRIR;
  return { sets, reps: block.baseReps, rir };
}

            <span style={{ fontSize: 22, fontWeight: 900, color: accentColor, fontFamily: "monospace" }}>{block.type}</span>
            <span style={{ fontSize: 14, letterSpacing: 2, color: "#BBB", fontFamily: "monospace", fontWeight: 700 }}>{block.label}</span>
          </div>
          <span style={{ fontSize: 13, color: "#888", fontFamily: "monospace", fontWeight: 600 }}>{block.rest}</span>
        </div>
      </div>

      {block.exercises.map((ex, i) => {
        const sets = ex.isA1 ? prescriptions.sets : prescriptions.sets;
        const reps = ex.isA1 ? prescriptions.reps : (ex.reps || prescriptions.reps);
        const rir = ex.isA1 ? prescriptions.rir : prescriptions.rir;
        const isLast = i === block.exercises.length - 1;
        const info = EX[ex.name];
        const isOpen = open === ex.name;

        return (
          <div key={i} style={{ borderBottom: isLast ? "none" : "1px solid #181818" }}>
            <div onClick={() => info && onToggle(ex.name)}
              style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10, cursor: info ? "pointer" : "default", minHeight: 48 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1 }}>
                  {ex.anchor && <span style={{ fontSize: 20 }}>⭐</span>}
                  <span style={{ fontSize: 21, color: isOpen ? color : "#FFF", fontWeight: ex.anchor ? 800 : 700, lineHeight: 1.25 }}>{ex.name}</span>
                  {info && <span style={{ fontSize: 14, color: isOpen ? color : "#888", fontWeight: 800, marginLeft: 2 }}>{isOpen ? "▲" : "▼"}</span>}
                </div>
              </div>

              <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
                <PrescriptionPill label="SETS" value={String(sets)} color={accentColor} />
                <PrescriptionPill label="REPS" value={reps} color={accentColor} />
                <PrescriptionPill label="RIR" value={rir} color={accentColor} />
              </div>

              {ex.note && <div style={{ fontSize: 15, color: "#AAA", marginTop: 2 }}>{ex.note}</div>}
            </div>

            {isOpen && info && (
              <div style={{ padding: "0 16px 14px" }}>
                <InfoPanel info={info} color={color} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function PrescriptionPill({ label, value, color }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
      <span style={{ fontSize: 12, letterSpacing: 2, color: "#888", fontFamily: "monospace", fontWeight: 700 }}>{label}</span>
      <span style={{ fontSize: 22, color, fontFamily: "monospace", fontWeight: 800 }}>{value}</span>
    </div>
  );
}

function Section({ label, sublabel, color, children }) {
  return (
    <div style={{ background: "#0E0E0E", border: "2px solid #222", borderRadius: 10, padding: "14px 16px" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10, paddingBottom: 8, borderBottom: "1px solid #1F1F1F", flexWrap: "wrap" }}>
        <span style={{ fontSize: 14, letterSpacing: 3, color, fontFamily: "monospace", fontWeight: 800 }}>{label}</span>
        {sublabel && <span style={{ fontSize: 13, color: "#888", fontFamily: "monospace" }}>{sublabel}</span>}
      </div>
      {children}
    </div>
  );
}

function ExRow({ exercise, color, open, onToggle }) {
  const info = EX[exercise.name];
  const isOpen = open === exercise.name;
  return (
    <div>
      <div onClick={() => info && onToggle(exercise.name)}
        style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", cursor: info ? "pointer" : "default", gap: 12, minHeight: 48 }}>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flex: 1 }}>
          <span style={{ fontSize: 17, color: isOpen ? color : "#EEE", fontWeight: 600 }}>{exercise.name}</span>
          {info && <span style={{ fontSize: 13, color: isOpen ? color : "#888", fontWeight: 800, marginLeft: 4 }}>{isOpen ? "▲" : "▼"}</span>}
        </div>
        <span style={{ fontSize: 14, color: "#AAA", fontFamily: "monospace", fontWeight: 600, whiteSpace: "nowrap" }}>{exercise.prescription}</span>
      </div>
      {isOpen && info && (
        <div style={{ padding: "0 16px 10px" }}>
          <InfoPanel info={info} color={color} />
        </div>
      )}
    </div>
  );
}

// ─── INFO PANEL ─────────────────────────────────────────────────────────
function InfoPanel({ info, color }) {
  return (
    <div style={{ background: "#080808", borderLeft: `4px solid ${color}`, padding: "14px 16px", borderRadius: "0 8px 8px 0", marginTop: 6 }}>
      <InfoSect label="HOW TO" color={color}>
        <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.howTo}</p>
      </InfoSect>
      <InfoSect label="FEEL" color={color}>
        <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.feel}</p>
      </InfoSect>
      <InfoSect label="WHAT MOVES" color={color}>
        <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.moves}</p>
      </InfoSect>
      {info.tempo && (
        <InfoSect label="TEMPO" color={color}>
          <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.tempo}</p>
        </InfoSect>
      )}
      {info.warmupSets && (
        <InfoSect label="WARM-UP SETS" color="#FFB14A">
          <p style={{ margin: 0, fontSize: 17, color: "#F0D0A0", lineHeight: 1.55 }}>{info.warmupSets}</p>
        </InfoSect>
      )}
      {info.breathing && (
        <InfoSect label="BREATHING & BRACE" color={color}>
          <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.breathing}</p>
        </InfoSect>
      )}
      {info.progression && (
        <InfoSect label="PROGRESSION" color="#8FE082">
          <p style={{ margin: 0, fontSize: 17, color: "#C5EBC0", lineHeight: 1.55 }}>{info.progression}</p>
        </InfoSect>
      )}
      {info.sub && (
        <InfoSect label="IF EQUIPMENT MISSING" color="#9DC4EE">
          <p style={{ margin: 0, fontSize: 17, color: "#C5DCEC", lineHeight: 1.55 }}>{info.sub}</p>
        </InfoSect>
      )}
      {info.belt && (
        <InfoSect label="BELT" color={color}>
          <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.belt}</p>
        </InfoSect>
      )}
      {info.equipment && (
        <InfoSect label="EQUIPMENT" color={color}>
          <p style={{ margin: 0, fontSize: 17, color: "#EAEAEA", lineHeight: 1.55 }}>{info.equipment}</p>
        </InfoSect>
      )}
      <InfoSect label="COMMON MISTAKES" color={color} last>
        {info.mistakes.map((m, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginTop: i === 0 ? 0 : 10, alignItems: "flex-start" }}>
            <span style={{ color: "#FF8866", fontSize: 17, marginTop: 1, flexShrink: 0, fontWeight: 800 }}>⚠</span>
            <span style={{ fontSize: 17, color: "#DADADA", lineHeight: 1.5 }}>{m}</span>
          </div>
        ))}
      </InfoSect>
    </div>
  );
}

function InfoSect({ label, color, children, last }) {
  return (
    <div style={{ marginBottom: last ? 0 : 16 }}>
      <div style={{ fontSize: 13, letterSpacing: 2, color, fontFamily: "monospace", marginBottom: 7, fontWeight: 800 }}>{label}</div>
      {children}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ProgramViewer />);
</script>
</body>
</html>
