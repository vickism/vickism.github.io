function getSetsReps(block, week) {
  if (block.isA1) {
    return {
      sets: A1_SETS_BY_WEEK[week],
      reps: A1_REPS_BY_WEEK[week],
      rir: A1_RIR_BY_WEEK[week],
    };
  }
  const sets = setsForWeek(block.baseSets || 3, week);
  const rir = week === 4 ? "4 (deload)" : block.baseRIR;
  return { sets, reps: block.baseReps, rir };
}

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

function useDoneSets(dayId, weekId) {
  const storageKey = `program-may26-done-${todayKey()}-${dayId}-w${weekId}`;
  const [done, setDone] = useState(() => {
    try {
      const raw = localStorage.getItem(storageKey);
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  });

  useEffect(() => {
    try {
      const raw = localStorage.getItem(storageKey);
      setDone(raw ? new Set(JSON.parse(raw)) : new Set());
    } catch { setDone(new Set()); }
  }, [storageKey]);

  const toggle = (id) => {
    setDone(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      try { localStorage.setItem(storageKey, JSON.stringify([...next])); } catch {}
      return next;
    });
  };

  const reset = () => {
    setDone(new Set());
    try { localStorage.removeItem(storageKey); } catch {}
  };

  return [done, toggle, reset];
}

    <div style={{
      marginBottom: 14,
      background: isA1 ? `linear-gradient(135deg, ${color}18, #0C0C0C 50%)` : "#0E0E0E",
      border: `2px solid ${isA1 ? `${color}55` : "#222"}`,
      borderLeft: `6px solid ${accentColor}`,
      borderRadius: 10,
      overflow: "hidden"
    }}>
      {/* BLOCK HEADER */}
      <div style={{ padding: "10px 14px", borderBottom: "1px solid #1A1A1A", display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
          <span style={{ fontSize: 22, fontWeight: 900, color: accentColor, fontFamily: "monospace" }}>{block.type}</span>
          <span style={{ fontSize: 13, letterSpacing: 2, color: "#AAA", fontFamily: "monospace", fontWeight: 700 }}>{block.label}</span>
        </div>
        <span style={{ fontSize: 13, color: "#888", fontFamily: "monospace", fontWeight: 600 }}>Rest {block.rest}</span>
      </div>

      {/* EXERCISE HEADERS — one per exercise (form cues toggle here) */}
      <div style={{ padding: "0", borderBottom: "1px solid #1A1A1A" }}>
        {exercises.map((ex, i) => {
          const info = EX[ex.name];
          const isOpen = openExercise === ex.name;
          return (
            <ExerciseHeader key={i} ex={ex} info={info} isOpen={isOpen} toggleEx={toggleEx} color={color} isLast={i === exercises.length - 1} />
          );
        })}
      </div>

      {/* RUN SHEET ROWS */}
      {isA1 ? (
        <A1RunSheet block={block} presc={presc} color={color} done={done} onToggleSet={onToggleSet} />
      ) : block.isSuperset ? (
        <SupersetRunSheet block={block} presc={presc} color={accentColor} done={done} onToggleSet={onToggleSet} />
      ) : (
        <SingleRunSheet block={block} presc={presc} color={accentColor} done={done} onToggleSet={onToggleSet} />
      )}
    </div>
  );
}

function ExerciseHeader({ ex, info, isOpen, toggleEx, color, isLast }) {
  return (
    <div style={{ borderBottom: isLast ? "none" : "1px solid #161616" }}>
      <div onClick={() => info && toggleEx(ex.name)}
        style={{ padding: "12px 14px", cursor: info ? "pointer" : "default", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, minHeight: 48 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            {ex.anchor && <span style={{ fontSize: 20 }}>⭐</span>}
            <span style={{ fontSize: 20, color: isOpen ? color : "#FFF", fontWeight: ex.anchor ? 800 : 700, lineHeight: 1.25 }}>{ex.name}</span>
          </div>
          {ex.note && <div style={{ fontSize: 14, color: "#AAA", marginTop: 4 }}>{ex.note}</div>}
        </div>
        {info && (
          <span style={{ fontSize: 12, color: isOpen ? color : "#888", fontFamily: "monospace", fontWeight: 700, whiteSpace: "nowrap", padding: "6px 10px", border: `1.5px solid ${isOpen ? color : "#333"}`, borderRadius: 6 }}>
            {isOpen ? "▲ FORM" : "▼ FORM"}
          </span>
        )}
      </div>
      {isOpen && info && (
        <div style={{ padding: "0 14px 12px" }}>
          <InfoPanel info={info} color={color} />
        </div>
      )}
    </div>
  );
}

// ─── A1 RUN SHEET — warmup ramp + working sets ─────────────────────────
function A1RunSheet({ block, presc, color, done, onToggleSet }) {
  const ex = block.exercises[0];
  const ramp = WARMUP_RAMPS[ex.name] || [];
  const sets = presc.sets;

  return (
    <div>
      {/* WARM-UP SECTION */}
      {ramp.length > 0 && (
        <>
          <SubHeader label="WARM-UP RAMP" color="#FFB14A" />
          {ramp.map((r, i) => {
            const id = `${ex.name}-w-${i}`;
            return (
              <SetRow key={id} id={id}
                done={done.has(id)} onToggle={onToggleSet}
                tickColor="#FFB14A"
                leftLabel={`WARM-UP ${i+1} / ${ramp.length}`}
                rightLabel={`${r.weight} × ${r.reps}`}
                note={r.note}
              />
            );
          })}
        </>
      )}

      {/* WORKING SETS */}
      <SubHeader label="WORKING SETS" color={color} />
      {[...Array(sets)].map((_, i) => {
        const id = `${ex.name}-s-${i}`;
        return (
          <SetRow key={id} id={id}
            done={done.has(id)} onToggle={onToggleSet}
            tickColor={color}
            leftLabel={`SET ${i+1} / ${sets}`}
            rightLabel={`${presc.reps} reps`}
            note={`RIR ${presc.rir}`}
            big
          />
        );
      })}
    </div>
  );
}

// ─── SINGLE EXERCISE RUN SHEET (A2-like) ───────────────────────────────
function SingleRunSheet({ block, presc, color, done, onToggleSet }) {
  const ex = block.exercises[0];
  const sets = presc.sets;
  const reps = ex.reps || presc.reps;
  return (
    <div>
      {[...Array(sets)].map((_, i) => {
        const id = `${ex.name}-s-${i}`;
        return (
          <SetRow key={id} id={id}
            done={done.has(id)} onToggle={onToggleSet}
            tickColor={color}
            leftLabel={`SET ${i+1} / ${sets}`}
            rightLabel={`${reps} reps`}
            note={`RIR ${presc.rir}`}
          />
        );
      })}
    </div>
  );
}

// ─── SUPERSET / CIRCUIT RUN SHEET — rounds × exercises ─────────────────
function SupersetRunSheet({ block, presc, color, done, onToggleSet }) {
  const rounds = presc.sets;
  return (
    <div>
      {[...Array(rounds)].map((_, r) => (
        <React.Fragment key={r}>
          <SubHeader label={`ROUND ${r+1} / ${rounds}`} color={color} />
          {block.exercises.map((ex, i) => {
            const id = `${ex.name}-r${r}-${i}`;
            const reps = ex.reps || presc.reps;
            return (
              <SetRow key={id} id={id}
                done={done.has(id)} onToggle={onToggleSet}
                tickColor={color}
                leftLabel={ex.name}
                rightLabel={reps}
                note={ex.note}
              />
            );
          })}
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── PRIMER / GLUTE WARM-UP ROW (simple, no rounds) ────────────────────
function SimpleSetRow({ id, name, detail, done, onToggle, openExercise, toggleEx, accentColor }) {
  const info = EX[name];
  const isOpen = openExercise === name;
  const isDone = done.has(id);
  return (
    <div style={{ borderBottom: "1px solid #161616" }}>
      <div style={{ display: "flex", alignItems: "stretch", minHeight: 56 }}>
        {/* TICK ZONE */}
        <div onClick={() => onToggle(id)}
          style={{ display: "flex", alignItems: "center", padding: "0 14px", cursor: "pointer", flexShrink: 0 }}>
          <TickBox done={isDone} color={accentColor} />
        </div>
        {/* NAME + DETAIL ZONE (tap = open form) */}
        <div onClick={() => info && toggleEx(name)}
          style={{ flex: 1, padding: "10px 14px 10px 0", cursor: info ? "pointer" : "default", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 17, color: isOpen ? accentColor : (isDone ? "#666" : "#EEE"), fontWeight: 600, textDecoration: isDone ? "line-through" : "none" }}>{name}</span>
            {info && <span style={{ fontSize: 12, color: isOpen ? accentColor : "#777", fontWeight: 800, marginLeft: 4 }}>{isOpen ? "▲" : "▼"}</span>}
          </div>
          <span style={{ fontSize: 14, color: isDone ? "#555" : "#AAA", fontFamily: "monospace", whiteSpace: "nowrap", textDecoration: isDone ? "line-through" : "none" }}>{detail}</span>
        </div>
      </div>
      {isOpen && info && (
        <div style={{ padding: "0 14px 10px" }}>
          <InfoPanel info={info} color={accentColor} />
        </div>
      )}
    </div>
  );
}

// ─── SET ROW (tickable run-sheet row) ──────────────────────────────────
function SetRow({ id, done, onToggle, tickColor, leftLabel, rightLabel, note, big }) {
  return (
    <div onClick={() => onToggle(id)}
      style={{
        display: "flex",
        alignItems: "center",
        gap: 14,
        padding: big ? "14px 14px" : "12px 14px",
        borderBottom: "1px solid #161616",
        cursor: "pointer",
        background: done ? "#080808" : "transparent",
        opacity: done ? 0.5 : 1,
        minHeight: 56,
        transition: "opacity 0.15s, background 0.15s",
      }}
    >
      <TickBox done={done} color={tickColor} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 12, letterSpacing: 1.5, color: "#888",
          fontFamily: "monospace", fontWeight: 700, marginBottom: 2,
        }}>{leftLabel}</div>
        <div style={{
          fontSize: big ? 21 : 18,
          color: done ? "#777" : "#FFF",
          fontWeight: 700,
          lineHeight: 1.25,
          textDecoration: done ? "line-through" : "none",
        }}>{rightLabel}</div>
        {note && <div style={{ fontSize: 13, color: done ? "#555" : "#999", marginTop: 3 }}>{note}</div>}
      </div>
    </div>
  );
}

function TickBox({ done, color }) {
  return (
    <div style={{
      width: 34, height: 34, flexShrink: 0,
      border: `2.5px solid ${done ? color : "#3A3A3A"}`,
      background: done ? color : "transparent",
      borderRadius: 8,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 22, fontWeight: 900,
      color: done ? "#000" : "transparent",
      transition: "all 0.15s",
    }}>{done ? "✓" : ""}</div>
  );
}

function SubHeader({ label, color }) {
  return (
    <div style={{
      padding: "8px 14px",
      background: "#070707",
      borderBottom: "1px solid #181818",
      fontSize: 11, letterSpacing: 2.5,
      color, fontFamily: "monospace", fontWeight: 800,
    }}>{label}</div>
  );
}

function Section({ label, sublabel, color, children }) {
  return (
    <div style={{ background: "#0E0E0E", border: "2px solid #222", borderRadius: 10, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, padding: "12px 16px", borderBottom: "1px solid #1F1F1F", flexWrap: "wrap" }}>
        <span style={{ fontSize: 14, letterSpacing: 3, color, fontFamily: "monospace", fontWeight: 800 }}>{label}</span>
        {sublabel && <span style={{ fontSize: 13, color: "#888", fontFamily: "monospace" }}>{sublabel}</span>}
      </div>
      {children}
    </div>
  );
}

// ─── INFO PANEL ─────────────────────────────────────────────────────────
function InfoPanel({ info, color }) {
  return (
    <div style={{ background: "#080808", borderLeft: `4px solid ${color}`, padding: "14px 16px", borderRadius: "0 8px 8px 0", marginTop: 6 }}>
      <InfoSect label="HOW TO" color={color}>
        <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.howTo}</p>
      </InfoSect>
      <InfoSect label="FEEL" color={color}>
        <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.feel}</p>
      </InfoSect>
      <InfoSect label="WHAT MOVES" color={color}>
        <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.moves}</p>
      </InfoSect>
      {info.tempo && (
        <InfoSect label="TEMPO" color={color}>
          <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.tempo}</p>
        </InfoSect>
      )}
      {info.breathing && (
        <InfoSect label="BREATHING & BRACE" color={color}>
          <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.breathing}</p>
        </InfoSect>
      )}
      {info.progression && (
        <InfoSect label="PROGRESSION" color="#8FE082">
          <p style={{ margin: 0, fontSize: 16, color: "#C5EBC0", lineHeight: 1.55 }}>{info.progression}</p>
        </InfoSect>
      )}
      {info.sub && (
        <InfoSect label="IF EQUIPMENT MISSING" color="#9DC4EE">
          <p style={{ margin: 0, fontSize: 16, color: "#C5DCEC", lineHeight: 1.55 }}>{info.sub}</p>
        </InfoSect>
      )}
      {info.belt && (
        <InfoSect label="BELT" color={color}>
          <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.belt}</p>
        </InfoSect>
      )}
      {info.equipment && (
        <InfoSect label="EQUIPMENT" color={color}>
          <p style={{ margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.55 }}>{info.equipment}</p>
        </InfoSect>
      )}
      <InfoSect label="COMMON MISTAKES" color={color} last>
        {info.mistakes.map((m, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginTop: i === 0 ? 0 : 10, alignItems: "flex-start" }}>
            <span style={{ color: "#FF8866", fontSize: 16, marginTop: 1, flexShrink: 0, fontWeight: 800 }}>⚠</span>
            <span style={{ fontSize: 16, color: "#DADADA", lineHeight: 1.5 }}>{m}</span>
          </div>
        ))}
      </InfoSect>
    </div>
  );
}

function InfoSect({ label, color, children, last }) {
  return (
    <div style={{ marginBottom: last ? 0 : 14 }}>
      <div style={{ fontSize: 12, letterSpacing: 2, color, fontFamily: "monospace", marginBottom: 6, fontWeight: 800 }}>{label}</div>
      {children}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ProgramViewer />);
</script>
</body>
</html>
