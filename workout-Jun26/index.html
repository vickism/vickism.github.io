        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6 }}>

function CollapseButton({ open, setOpen, icon, title, sub, accent }) {
  return (
    <button onClick={() => setOpen(o => !o)}
      style={{ width: "100%", background: "#141414", border: `2px solid ${open ? accent : "#262626"}`, borderRadius: open ? "10px 10px 0 0" : 10, padding: "14px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, textAlign: "left" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 17, color: accent, fontWeight: 800 }}>{icon} {title}</div>
        <div style={{ fontSize: 14, color: "#BBB", marginTop: 3 }}>{sub}</div>
      </div>
      <span style={{ fontSize: 20, color: accent, fontWeight: 800, flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
    </button>
  );
}

function BlockCard({ block, color, open, onToggle }) {
  const isA = block.type === "A1" || block.type === "A2";
  const accentColor = isA ? color : "#C5C5C5";
  return (
    <div style={{ marginBottom: 16, background: isA ? `linear-gradient(135deg, ${color}18, #111 50%)` : "#121212", border: `2px solid ${isA ? `${color}55` : "#262626"}`, borderLeft: `6px solid ${isA ? color : "#3A3A3A"}`, borderRadius: 10, overflow: "hidden" }}>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid #232323", background: isA ? "transparent" : "#1A1A1A" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 12, alignItems: "baseline" }}>
            <span style={{ fontSize: 18, fontWeight: 800, color: isA ? color : "#FFF" }}>{block.type}</span>
            <span style={{ fontSize: 15, color: "#D5D5D5", fontWeight: 600 }}>{block.label}</span>
          </div>
          <span style={{ fontSize: 14, color: "#BBB", fontWeight: 500 }}>{block.rest}</span>
        </div>
      </div>
      {block.exercises.map((ex, i) => {
        const isLast = i === block.exercises.length - 1;
        const info = EX[ex.name];
        const isOpen = open === ex.name;
        return (
          <div key={i} style={{ borderBottom: isLast ? "none" : "1px solid #1F1F1F" }}>
            <div onClick={() => info && onToggle(ex.name)} style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10, cursor: info ? "pointer" : "default", minHeight: 44 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                {ex.priority && <span style={{ fontSize: 18 }}>⭐</span>}
                {ex.reintro && <span style={{ fontSize: 18 }}>⚠️</span>}
                {ex.core && <span style={{ fontSize: 16 }}>🧱</span>}
                {ex.leg && <span style={{ fontSize: 16 }}>🦵</span>}
                <span style={{ fontSize: 18, color: isOpen ? color : "#FFF", fontWeight: (ex.priority || ex.reintro) ? 800 : 700 }}>{ex.name}</span>
                {info && <span style={{ fontSize: 14, color: isOpen ? color : "#999", fontWeight: 700 }}>{isOpen ? "▲" : "▼"}</span>}
              </div>
              <div style={{ display: "flex", gap: 18, flexWrap: "wrap", alignItems: "flex-end" }}>
                <Pill label="Sets" value={ex.sets} color={color} />
                <Pill label="Reps" value={ex.reps} color={color} />
                {ex.rir && <Pill label="RIR" value={ex.rir} color={color} />}
              </div>
              {ex.note && <div style={{ fontSize: 15, color: ex.reintro ? "#FFD27A" : "#D0D0D0", marginTop: 2, fontWeight: ex.reintro ? 600 : 400 }}>{ex.note}</div>}
            </div>
            {isOpen && info && <div style={{ padding: "0 16px 14px" }}><InfoPanel info={info} color={color} /></div>}
          </div>
        );
      })}
    </div>
  );
}

function Pill({ label, value, color }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
      <span style={{ fontSize: 13, color: "#BBB", fontWeight: 600 }}>{label}</span>
      <span style={{ fontSize: 22, color, fontWeight: 800, lineHeight: 1 }}>{value}</span>
    </div>
  );
}

function Section({ label, sublabel, color, children }) {
  return (
    <div style={{ background: "#111", border: "2px solid #262626", borderRadius: 10, padding: "14px 16px" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10, paddingBottom: 8, borderBottom: `2px solid ${color}55`, flexWrap: "wrap" }}>
        <span style={{ fontSize: 17, color, fontWeight: 800 }}>{label}</span>
        {sublabel && <span style={{ fontSize: 14, color: "#BBB", fontWeight: 500 }}>{sublabel}</span>}
      </div>
      {children}
    </div>
  );
}

function ExRow({ exercise, color, open, onToggle }) {
  const info = EX[exercise.name];
  const isOpen = open === exercise.name;
  return (
    <div style={{ borderBottom: "1px solid #1E1E1E" }}>
      <div onClick={() => info && onToggle(exercise.name)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", cursor: info ? "pointer" : "default", gap: 12, minHeight: 44 }}>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flex: 1, minWidth: 0 }}>
          <span style={{ fontSize: 16, color: isOpen ? color : "#FFF", fontWeight: 600 }}>{exercise.name}</span>
          {info && <span style={{ fontSize: 13, color: isOpen ? color : "#999", marginLeft: 4, fontWeight: 700 }}>{isOpen ? "▲" : "▼"}</span>}
        </div>
        <span style={{ fontSize: 15, color: "#E0E0E0", flexShrink: 0, fontWeight: 600 }}>{exercise.prescription}</span>
      </div>
      {isOpen && info && <div style={{ padding: "0 14px 12px" }}><InfoPanel info={info} color={color} /></div>}
    </div>
  );
}

function InfoPanel({ info, color }) {
  return (
    <div style={{ background: "#0A0A0A", borderLeft: `4px solid ${color}`, padding: "16px 18px", borderRadius: "0 8px 8px 0", marginTop: 6 }}>
      <InfoSect label="How to do it" color={color}><p style={pStyle}>{info.howTo}</p></InfoSect>
      <InfoSect label="What you should feel" color={color}><p style={pStyle}>{info.feel}</p></InfoSect>
      <InfoSect label="What moves" color={color}><p style={pStyle}>{info.moves}</p></InfoSect>
      {info.reintro && <InfoSect label="⚠️ Shoulder comeback rule" color="#E8A838"><p style={{ ...pStyle, color: "#FFD27A" }}>{info.reintro}</p></InfoSect>}
      {info.progression && <InfoSect label="How to progress" color="#7DC272"><p style={{ ...pStyle, color: "#B8E5B0" }}>{info.progression}</p></InfoSect>}
      {info.sub && <InfoSect label="If it hurts / no kit" color="#7AB8FF"><p style={{ ...pStyle, color: "#B5D5FF" }}>{info.sub}</p></InfoSect>}
      {info.equipment && <InfoSect label="Equipment" color={color}><p style={pStyle}>{info.equipment}</p></InfoSect>}
      <InfoSect label="Common mistakes" color={color} last>
        {info.mistakes.map((m, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginTop: i === 0 ? 0 : 10, alignItems: "flex-start" }}>
            <span style={{ color: "#FF8866", fontSize: 16, marginTop: 1, flexShrink: 0, fontWeight: 800 }}>⚠</span>
            <span style={{ fontSize: 16, color: "#DADADA", lineHeight: 1.55 }}>{m}</span>
          </div>
        ))}
      </InfoSect>
    </div>
  );
}

const pStyle = { margin: 0, fontSize: 16, color: "#EAEAEA", lineHeight: 1.6 };

function InfoSect({ label, color, children, last }) {
  return (
    <div style={{ marginBottom: last ? 0 : 18 }}>
      <div style={{ fontSize: 14, color, fontWeight: 800, marginBottom: 8 }}>{label}</div>
      {children}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ProgramViewer />);
</script>
</body>
</html>
